trigger:
  branches:
    include:
      - main
      - develop
  tags:
    include:
      - 'v*'

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

# IMPORTANT: Configure the following variable in Azure Pipeline settings:
# - DOCKER_ORG: Your DockerHub organization name (e.g., 'mycompany')
variables:
  - name: imageTag
    value: '$(Build.SourceBranchName)-$(Build.BuildId)'
  - name: isMainBranch
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  - name: isTagBuild
    value: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/v')]
  - name: isFeatureBranch
    value: $[startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')]

stages:
  - stage: Build
    displayName: 'Build and Push Docker Images'
    jobs:
      # =========================================================================
      # Job 1: Build Theme Designer App
      # =========================================================================
      - job: BuildAppImage
        displayName: 'Build Theme Designer App'
        steps:
          - checkout: self
            fetchDepth: 1

          # Build UI5 app before Docker build
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '22.x'

          - script: |
              cd theme-designer-app
              npm ci --ignore-scripts
              npm run build:opt
            displayName: 'Build UI5 application'

          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              containerRegistry: 'DockerHubSimplifier'
              command: 'login'

          - script: |
              docker buildx create --use --name app-builder --driver docker-container
              docker buildx inspect --bootstrap
            displayName: 'Setup buildx for Theme Designer App'

          # Main branch build
          - script: |
              echo "Building Theme Designer App (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --tag $(DOCKER_ORG)/theme-designer:$(imageTag) \
                --tag $(DOCKER_ORG)/theme-designer:latest \
                --push \
                theme-designer-app/

              echo "Successfully built: $(DOCKER_ORG)/theme-designer:latest (amd64 + arm64)"
            displayName: 'Build and push Theme Designer App (main)'
            condition: and(succeeded(), eq(variables.isMainBranch, true))

          # Tagged release build
          - script: |
              TAG_NAME=$(echo $(Build.SourceBranch) | sed 's/refs\/tags\///')
              echo "Building tagged release: $TAG_NAME (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --build-arg VERSION=$TAG_NAME \
                --tag $(DOCKER_ORG)/theme-designer:$TAG_NAME \
                --tag $(DOCKER_ORG)/theme-designer:latest \
                --push \
                theme-designer-app/

              echo "Successfully built: $(DOCKER_ORG)/theme-designer:$TAG_NAME (amd64 + arm64)"
            displayName: 'Build and push Theme Designer App (tagged release)'
            condition: and(succeeded(), eq(variables.isTagBuild, true))

          # PR build (no push, amd64 only for speed)
          - script: |
              docker buildx build \
                --platform linux/amd64 \
                --tag $(DOCKER_ORG)/theme-designer:pr-$(System.PullRequest.PullRequestNumber) \
                theme-designer-app/

              echo "PR image built successfully (not pushed)"
            displayName: 'Build Theme Designer App (PR verification)'
            condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

          # Feature branch build (manual trigger only, no :latest tag)
          - script: |
              echo "Building Feature Branch: $(Build.SourceBranchName) (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --tag $(DOCKER_ORG)/theme-designer:$(imageTag) \
                --tag $(DOCKER_ORG)/theme-designer:$(Build.SourceBranchName) \
                --push \
                theme-designer-app/

              echo "Successfully built: $(DOCKER_ORG)/theme-designer:$(imageTag) (amd64 + arm64)"
              echo "Also tagged as: $(DOCKER_ORG)/theme-designer:$(Build.SourceBranchName)"
              echo "Note: No :latest tag (feature branch)"
            displayName: 'Build and push Theme Designer App (feature branch)'
            condition: and(succeeded(), eq(variables.isFeatureBranch, true))

          - script: |
              docker buildx rm app-builder
            displayName: 'Cleanup buildx'
            condition: always()

      # =========================================================================
      # Job 2: Build Theme Builder API (single image for all UI5 versions)
      # =========================================================================
      - job: BuildBuilderAPI
        displayName: 'Build Theme Builder API'
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              containerRegistry: 'DockerHubSimplifier'
              command: 'login'

          - script: |
              docker buildx create --use --name builder-api --driver docker-container
              docker buildx inspect --bootstrap
            displayName: 'Setup buildx for Theme Builder API'

          # Main branch build
          - script: |
              echo "Building Theme Builder API (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --tag $(DOCKER_ORG)/theme-builder:$(imageTag) \
                --tag $(DOCKER_ORG)/theme-builder:latest \
                --push \
                theme-builder-api/

              echo "Successfully built: $(DOCKER_ORG)/theme-builder:latest (amd64 + arm64)"
            displayName: 'Build and push Theme Builder API (main)'
            condition: and(succeeded(), eq(variables.isMainBranch, true))

          # Tagged release build
          - script: |
              TAG_NAME=$(echo $(Build.SourceBranch) | sed 's/refs\/tags\///')
              echo "Building tagged release: $TAG_NAME (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --build-arg VERSION=$TAG_NAME \
                --tag $(DOCKER_ORG)/theme-builder:$TAG_NAME \
                --tag $(DOCKER_ORG)/theme-builder:latest \
                --push \
                theme-builder-api/

              echo "Successfully built: $(DOCKER_ORG)/theme-builder:$TAG_NAME (amd64 + arm64)"
            displayName: 'Build and push Theme Builder API (tagged release)'
            condition: and(succeeded(), eq(variables.isTagBuild, true))

          # PR build (no push)
          - script: |
              docker buildx build \
                --platform linux/amd64 \
                --tag $(DOCKER_ORG)/theme-builder:pr-$(System.PullRequest.PullRequestNumber) \
                theme-builder-api/

              echo "PR image built successfully (not pushed)"
            displayName: 'Build Theme Builder API (PR verification)'
            condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

          # Feature branch build (manual trigger only, no :latest tag)
          - script: |
              echo "Building Feature Branch: $(Build.SourceBranchName) (multi-arch: amd64 + arm64)"
              BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
              VCS_REF=$(git rev-parse --short HEAD)

              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --build-arg BUILD_DATE=$BUILD_DATE \
                --build-arg VCS_REF=$VCS_REF \
                --tag $(DOCKER_ORG)/theme-builder:$(imageTag) \
                --tag $(DOCKER_ORG)/theme-builder:$(Build.SourceBranchName) \
                --push \
                theme-builder-api/

              echo "Successfully built: $(DOCKER_ORG)/theme-builder:$(imageTag) (amd64 + arm64)"
              echo "Also tagged as: $(DOCKER_ORG)/theme-builder:$(Build.SourceBranchName)"
              echo "Note: No :latest tag (feature branch)"
            displayName: 'Build and push Theme Builder API (feature branch)'
            condition: and(succeeded(), eq(variables.isFeatureBranch, true))

          - script: |
              docker buildx rm builder-api
            displayName: 'Cleanup buildx'
            condition: always()

