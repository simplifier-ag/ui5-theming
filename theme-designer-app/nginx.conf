# Nginx configuration for Theme Designer
# Serves UI on port 8080 and proxies API requests to internal port 3000

# Run nginx worker processes as nobody (non-root)
user nobody nobody;

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /dev/stdout;

    # Temporary paths (writable by non-root user)
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    # Note: uwsgi and scgi modules not compiled (--without-http_uwsgi_module, --without-http_scgi_module)

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Upstream for API server
    upstream api_backend {
        server localhost:3000;
    }

    server {
        listen 8080;
        server_name _;

        # Root directory for UI5 app
        root /app/dist;
        index index.html;

        # Client max body size (for theme ZIP imports)
        client_max_body_size 50M;

        # API proxy - forward all /api/* requests to Node.js server on port 3000
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts for long-running theme compilation
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Auth proxy - forward all /auth/* requests to Node.js server on port 3000 (OAuth endpoints)
        location /auth/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Forward X-Forwarded-Proto from Traefik (don't overwrite with $scheme)
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_cache_bypass $http_upgrade;

            # OAuth redirects
            proxy_redirect off;
        }

        # UI5 resources - serve static files with caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML files - no cache
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # SPA fallback - serve index.html for all non-existent routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint (proxied to API)
        location /health {
            proxy_pass http://api_backend/api/health;
            access_log off;
        }
    }
}
