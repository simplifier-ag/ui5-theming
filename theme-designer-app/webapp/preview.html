<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Theme Preview</title>
	<script>
		// Get UI5 version from URL parameter (e.g., ?version=1.96.40)
		const urlParams = new URLSearchParams(window.location.search);
		const ui5Version = urlParams.get('version') || '1.96.40';

		// Load UI5 from CDN with the specified version
		const ui5Script = document.createElement('script');
		ui5Script.id = 'sap-ui-bootstrap';
		ui5Script.src = `https://sdk.openui5.org/${ui5Version}/resources/sap-ui-core.js`;
		ui5Script.setAttribute('data-sap-ui-theme', 'sap_fiori_3');
		ui5Script.setAttribute('data-sap-ui-libs', 'sap.m');
		ui5Script.setAttribute('data-sap-ui-compatVersion', 'edge');
		ui5Script.setAttribute('data-sap-ui-async', 'true');
		ui5Script.setAttribute('data-sap-ui-frameOptions', 'allow');
		ui5Script.setAttribute('data-sap-ui-resourceroots', JSON.stringify({
			"themedesigner": "./"
		}));
		ui5Script.onload = function() {
			sap.ui.getCore().attachInit(function() {
				sap.ui.xmlview({
					viewName: "themedesigner.view.Preview"
				}).placeAt("content");
			});
		};
		document.head.appendChild(ui5Script);
	</script>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			height: 100%;
			overflow: auto;
		}
		#content {
			height: 100%;
		}
	</style>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
