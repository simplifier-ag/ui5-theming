specVersion: "4.0"
metadata:
  name: themedesigner
type: application
framework:
  name: OpenUI5
  version: "1.96.40"
  libraries:
    - name: sap.m
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.core
    - name: sap.ui.codeeditor
    - name: themelib_sap_fiori_3
builder:
  resources:
    excludes:
      - "test/e2e/**"
server:
  customMiddleware:
    - name: "@ui5/middleware-code-coverage"
      afterMiddleware: compression
    - name: ui5-middleware-livereload
      afterMiddleware: compression
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: "http://localhost:3000/api"
        strictSSL: false
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /auth
      configuration:
        baseUri: "http://localhost:3000/auth"
        strictSSL: false
